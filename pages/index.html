<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
  <title>SP Photography???</title>
  
	<style>
	/* Reseting the default body margins so they the the edges of the screen */
	body { 
		margin: 0;
		padding: 0;
	}

 	 /* The Main Flex Container */
 	 .main-layout {
		display: flex;
		height: 100vh; /* Setting to 100 so we get 100% of the viewport height*/
		width: 100vw; /* Same as the height */
		overflow: hidden; /* prevents whole page from schorrliing */
	  }

	  /* Left Sidebar */
	  .left-sidebar {
		width: 220px;
    	/*height: 100%;*/
		flex-shrink: 0; /* Prevents sidebar from squishing together */
		border-right: 2px solid black; /* Divides the sections */
		padding: 20px;
		background-color: transparent;
		overflow-y: auto; /* Allows siderbar to scroll independetly from panel */
    	display: flex;
    	flex-direction: column;
	  }

	  /* Main Content Area MIddle Area */
	  .content {
		flex-grow: 1; /* Takes up all remaining space */
		padding: 20px;
		overflow-y: auto; /* Same as side panel */
    	text-align: center;
	  }

    /* Right Column for button and photos */
    .right-column {
    width: 220px; /* fixed width to match the left sidebar column */
    flex-shrink: 0;
    padding: 20px;
    background-color: transparent;
    overflow-y: auto;
    }

	  /* My box style */
	  .myDiv {
      	display: flex;
      	flex-grow: 1;
      	flex-direction: column;
	    border: 5px outset black;
	    background-color: silver;
  	  	text-align: left;
	    padding: 10px;
	    margin-bottom: 15px; /* Ades spacing between boxes */
	  }
  
	  /* REmoving the deault margins from lists so that they fit well into the boxes */
	  .myDiv ul {
    	display: flex;
		list-style-type: none;
		padding: 0;
    	margin: 0;
 		flex-grow: 1;
	  }

    .left-sidebar .myDiv ul{
    flex-grow: 1; /* What actually stretches list onto the bottom of the box */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
	gap: 220px;
    }

    /* Attempting to add spacing to lines in the left siedebar*/
    .left-sidebar .myDiv li{
    font-size: 35px;
    }

    /* applying rules to .myDiv in .left-sidebar*/
    .left-sidebar .myDiv{
    flex-grow: 1; /* Stretches box to page*/
    margin-bottom: 10px;
    }

	/* Rule for h2 */
	.left-sidebar .myDiv h2 {
		margin: 0; /* Taking away default spacing*/
		margin-bottom: 30px; /*Adding some space between header and links */
		font-size: 40px; /* Slightly larger than links */
		text-decoration: underline;
	}

	.right-column .myDiv{
		flex-grow: 0;
		cursor: pointer; /*changes mouse into clicking hand */
		margin-bottom: 20px;
	}

	.right-column .myDiv p {
		margin: 0;
		font-size: 16px;
	}

	.right-column .myDiv:hover {
		background-color: black;
		color: white; /* flips text white */
	}

	/* Grid Container for photos */
	.photo-grid {
		display: grid;
		/* creating columns that stretch if having extra room */
		grid-template-columns: repeat(2, 1fr);
		grid-auto-rows: 280px;
		gap: 20px; /* empty space between photos */
		margin-top: 30px;
	}

	/* photo box placeholders */
	.photo-box {
		border: 5px outset black;
		background-color: silver;
		display: flex;
		justify-content: center;
		align-items: center;
		font-weight: bold;
	}

	.photo-box img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
	}

	/* 3 shape classes for photos */
	.wide {
		grid-column: span 2;
	}

	.tall {
		grid-row: span 2;
	}

	.large {
		grid-column: span 2;
		grid-row: span 2;
	}

	.sidebar-tall {
		height: 400px;
		margin-top: 20px;
		margin-bottom: 20px;
	}

	.content h1 {
		margin-top: 0;
	}

	</style>
</head>
<body>

	<div class="main-layout">

	  <aside class="left-sidebar">
	    <div class="myDiv">
	     <h2>Navigation</h2>		 
	     <ul>
	       <li>» Home</li> 
	       <li>» Projects</li>
	       <li>» Camera Gear</li>
	       <li>» About</li>
         <li>» Contact</li>
		 </ul>
	    </div>
   </aside>

   <main class="content">
     <h1>SP Photography</h1>
     
	 <div class="photo-grid">
		<div class="photo-box wide"><img src="wideImageTop.jpg" alt="Camera Gear"></div>

		<div class="photo-box">Photo</div>
		<div class="photo-box">Photo</div>
		<div class="photo-box">Photo</div>
		<div class="photo-box">Photo</div>

		<div class="photo-box wide">Wide Photo (Bottom)</div>
	 </div>
   </main>

   <aside class="right-column">
     <div class="myDiv">
       <p>*Button - dark mode</p>
     </div>

	 <div class="photo-box sidebar-tall"> Tall Photo 1</div>
	 <div class="photo-box sidebar-tall"> Tall Photo 2</div>
   </aside>

  </div>

</body> 
</html>
