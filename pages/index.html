	/* Reseting the default body margins so they the the edges of the screen */
	body { 
		margin: 0;
		padding: 0;
	}

 	 /* The Main Flex Container */
 	 .main-layout {
		display: flex;
		height: 100vh; /* Setting to 100 so we get 100% of the viewport height*/
		width: 100vw; /* Same as the height */
		overflow: hidden; /* prevents whole page from schorrliing */
	  }

	  /* Left Sidebar */
	  .left-sidebar {
		width: 220px;
		flex-shrink: 0; /* Prevents sidebar from squishing together */
		border-right: 2px solid black; /* Divides the sections */
		padding: 15px;
		background-color: transparent;
		overflow-y: auto; /* Allows siderbar to scroll independetly from panel */
	  }

	  /* Main Content Area MIddle Area */
	  .content {
		flex-grow: 1; /* Takes up all remaining space */

		overflow-y: auto; /* Same as side panel */
    text-align: center;
	  }

    /* Right Column for button and photos */
    .right-column {
    width: 220px; /* fixed width to match the left sidebar column */
    flex-shrink: 0;
    border-left: 2px solid black;
    padding: 15px;
    background-color: transparent;
    overflow-y: auto;
    }

	  /* My box style */
	  .myDiv {
	    border: 5px outset black;
	    background-color: silver;
  	  text-align: center;
	    padding: 10px;
	    margin-bottom: 15px; /* Ades spacing between boxes */
	  }
  
	  /* REmoving the deault margins from lists so that they fit well into the boxes */
	  .myDiv ul {
		list-style-type: none; 
		padding: 0;
    margin: 0;
	  }
