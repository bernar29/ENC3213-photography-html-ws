<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
  <title>Contact — SP Photography</title>
  <link rel="stylesheet" type="text/css" href="static/css/styles.css" />
</head>

<body>

  <div class="main-layout">

    <aside class="left-sidebar">
      <div class="myDiv">
       <h2>Navigation</h2>
       <ul>
         <li><a href="../index.html">» Home</a></li>
         <li><a href="projects.html">» Projects</a></li>
         <li><a href="camera-gear.html">» Camera Gear</a></li>
         <li><a href="about.html">» About</a></li>
         <li><a href="contact.html">» Contact</a></li>
       </ul>
      </div>
    </aside>

    <main class="content">
      <h1>Contact</h1>

      <div class="myDiv" style="text-align:left;">
        <h2>Get in touch</h2>
        <p>Please give <strong>2-3 days</strong> for the photographer to review your request. We thank you for your patience!</p>

        <!-- Modern contact form: floating labels, subject, and a mail-client fallback button -->
     <!-- To enable direct email delivery from a static site we use FormSubmit (https://formsubmit.co).
       You will need to confirm the email address once FormSubmit sends a verification link. -->
        <form id="contact-form" method="post" action="https://formsubmit.co/sandro.palacios@photographer.net">
          <!-- FormSubmit hidden fields: disable captcha for testing and set a default subject -->
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_subject" value="Website contact message">
          <div class="form-grid">
            <div class="form-control">
              <input name="name" type="text" placeholder=" " required />
              <label>Name</label>
            </div>
            <br>

            <div class="form-control">
              <input name="email" type="email" placeholder=" " required />
              <label>Email</label>
            </div>

            <div class="form-control" style="grid-column:1 / -1;">
              <input name="subject" type="text" placeholder=" " />
              <label>Subject</label>
            </div>

            <div class="form-control" style="grid-column:1 / -1;">
              <textarea name="message" rows="6" placeholder=" " required></textarea>
              <label>Message</label>
            </div>

            <div class="form-actions">
              <button class="btn" type="submit">Send message</button>
            </div>
          </div>
        </form>

        <h3>Other details</h3>
        
        <p>Monday-Friday / <strong>9:00 AM — 7:00 PM</strong></p>
      </div>

    </main>

    <aside class="right-column">
      <div class="myDiv">
        <button id="dark-mode-toggle" aria-pressed="false" style="padding:8px 12px; font-size:14px;">Toggle dark mode</button>
      </div>
    </aside>

  </div>

  <script src="static/js/site.js"></script>
</body>
</html>
